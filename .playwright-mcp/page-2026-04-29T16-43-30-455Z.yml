        - paragraph [ref=e19]: About
        - heading "A workshop built around round things, durable things, and unusual ideas." [level=2] [ref=e20]
        - paragraph [ref=e21]: Dave Byers has spent nearly 50 years building residential, commercial, and custom woodworking projects. One of a Kind is where that experience meets cedar wellness structures.
      - generic [ref=e22]:
        - generic [ref=e23]:
          - paragraph [ref=e24]: One of a Kind Creative Woodcrafting is based in Parksville on Vancouver Island. The shop handcrafts barrel saunas, cedar hot tubs, sleeping barrels, cedar yurts, insulated log concepts, and custom woodwork that does not fit neatly in a catalogue.
          - paragraph [ref=e25]: "Dave moved west with Shirley after losing a large New Brunswick woodworking shop to extreme winter snow. The new workshop carries forward decades of building knowledge with a clear rule: do not offer something that will not stand up to real weather."
          - paragraph [ref=e26]: That is why the best work here feels both playful and serious. A surfer graphic on a barrel sauna, a smoked acrylic scenic-view wall, a cedar sleeping pod for a retreat property, or a one-off furniture piece all still need to be built with the same practical attention.
